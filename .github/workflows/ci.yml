name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python files compile
        run: python -m py_compile agents-md-doctor/scripts/repo_inventory.py tests/test_repo_inventory.py

      - name: Run test suite
        run: python -m unittest discover -s tests

      - name: Smoke test inventory script
        run: python agents-md-doctor/scripts/repo_inventory.py .
